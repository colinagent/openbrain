<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <!-- Card gradient: pure white -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <!-- Top highlight overlay -->
    <linearGradient id="highlightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="42%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-5%" y="-2%" width="110%" height="115%">
      <feDropShadow dx="0" dy="22" stdDeviation="33" flood-color="#120F0C" flood-opacity="0.157"/>
    </filter>
    <!-- macOS 26 system app icon mask equivalent at 1024px:
         measured from Apple Notes/Reminders: 25px inset and 45.75px radius at 256px. -->
    <clipPath id="cardClip">
      <rect x="100" y="100" width="824" height="824" rx="183" ry="183"/>
    </clipPath>
    <!-- OpenBrain logo mark (light — white app icon background) -->
    <linearGradient id="openbrainGradient" x1="118" y1="62" x2="458.5" y2="413.5" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C87910"/>
      <stop offset="0.22" stop-color="#8A7D2E"/>
      <stop offset="0.44" stop-color="#3E8462"/>
      <stop offset="0.58" stop-color="#2F8F6B"/>
      <stop offset="0.72" stop-color="#5F9D86"/>
      <stop offset="0.82" stop-color="#84D8C5"/>
      <stop offset="0.92" stop-color="#DFF3EC"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- Shadow layer -->
  <rect x="100" y="100" width="824" height="824" rx="183" ry="183" filter="url(#shadow)" fill="#F9F6F2" fill-opacity="0"/>

  <!-- Card background with gradient -->
  <rect x="100" y="100" width="824" height="824" rx="183" ry="183" fill="url(#cardGrad)"/>

  <!-- Top highlight -->
  <rect x="100" y="100" width="824" height="824" rx="183" ry="183" fill="url(#highlightGrad)" clip-path="url(#cardClip)"/>

  <!-- Card border -->
  <rect x="102.5" y="102.5" width="819" height="819" rx="181" ry="181" fill="none" stroke="#D3CBC3" stroke-width="5" stroke-opacity="0.863"/>

  <!-- OpenBrain logo mark -->
